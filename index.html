<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,#1e6f5c 40%,#e5e5e5 40%);
            font-family: 'Segoe UI',sans-serif;
        }
        .calculator{
           width: 260px;
           background: #f1f3f6;
           padding: 20px;
           border-radius: 18px;
           text-align: center;
           
           box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .display{
            height: 60px;
            background: #e0e3e8;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        .buttons{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 12px;
        }
        button{
            height: 45px;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            background: #fff;

            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .add{background: #2ec4b6; color: white;}
        .mul{background: #ff9f1c; color: white;}
        .sub{background: #ff6b6b; color: white;}
        .div{background: #5e60ce; color: white;}
        .eq {background: #8e44ad; color: white;}

        button:hover{
            transform: scale(1.05);
        }
        
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">0</div>
        <div class="buttons">
            <button>C</button>
            <button>CE</button>
            <button>%</button>
            <button class="add">+</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="mul">x</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="sub">-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="div">÷</button>

            <button style="grid-column: span 2; border-radius: 25px;">0</button>
            <button>.</button>
            <button class="eq">=</button>
        </div>
    </div>
</body>
</html>
